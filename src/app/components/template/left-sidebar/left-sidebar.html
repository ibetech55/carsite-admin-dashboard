<div class="sidenav" [ngClass]="isLeftSidebarCollapsed() ? 'sidenav-collapsed' : ''">
    <div class="logo-container">
        <button class="logo" (click)="toggleCollapse()">
            <span>C</span>
        </button>
        @if(!isLeftSidebarCollapsed()){
            <div class="logo-text">Car Site</div>
        }
       
    </div>
<div
  class="sidenav-nav"
  >

  @for (item of items; track $index) {
    <mat-accordion class="sidenav-nav-item">
      <mat-expansion-panel [hideToggle]="isLeftSidebarCollapsed() || item.pages.length < 1">
        <mat-expansion-panel-header   [class.panel-header]="isLeftSidebarCollapsed()" class="panel-header2">
          <div class="sidenav-link-icon" [class.sidenav-link-icon2]="isLeftSidebarCollapsed()">
            <i [class]="item.icon"></i>
          </div>

          @if (!isLeftSidebarCollapsed()) {
            <span>{{ item.category }}</span>
          }
        </mat-expansion-panel-header>

        @for (page of item.pages; track $index) {
          <a class="page-list" [routerLink]="page.link"  [class.page-list2]="isLeftSidebarCollapsed()">{{page.name}}</a>
        }
      </mat-expansion-panel>
    </mat-accordion>
  }
</div>

</div>

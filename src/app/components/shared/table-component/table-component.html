<div class="table-component">
        <div class="mat-elevation-z8">
            <table mat-table [dataSource]="dataSource">
                @for(column of columnsData; track $index){
              
                    <ng-container [matColumnDef]="column.key">
                        <th mat-header-cell *matHeaderCellDef>{{column.columnName}}</th>

                        @if(column.key !== "component"){
                            <td mat-cell *matCellDef="let element"> {{element[column.key]}}</td>
                        }

                        
                        @if(column.key === "component"){
                            <td mat-cell *matCellDef="let element">
                                @if(column.component.type === "button"){
                                    <button mat-raised-button (click)="column.component?.action(element)">{{column.component.label}}</button>
                                }
                            </td>
                        }
                    </ng-container>
                    

       
                }

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>

            <mat-paginator [pageSizeOptions]="pageSizeOptions"
                            [length]="totalCount"
                            [pageSize]="this.pageSize"
                            (page)="onPageChange($event)"
                            showFirstLastButtons
                            aria-label="Select page of periodic elements">
            </mat-paginator>
        </div>
</div>

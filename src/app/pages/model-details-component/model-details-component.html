<div class="make-details-component page section-background" *ngIf="modelData$ | async as data">
    <h1 class="page-header">{{data.make.makeName}} {{data.modelName}}</h1>
    <app-model-details [modelData]="data" (openDialogEmitter)="openDialog()"></app-model-details>
    <div>
        <app-dialog-form-component 
            type="modelEdit" 
            [title]="EDIT_DIALOG_TITLE" 
            [data]="data" 
            confirmTitle="Warning!" 
            [form]="editModelForm"
            [confirmMessage]="EDIT_MODEL_CONFIRM_MESSAGE"
            (handleEmitter)="editModel()"
        />
    </div>
</div>

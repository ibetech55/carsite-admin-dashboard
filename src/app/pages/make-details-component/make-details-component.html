<div class="make-details-component page section-background" *ngIf="makeData$ | async as data">
    <h1 class="page-header">{{data.makeName}} Details</h1>
    <div class="make-details-component_details">
        <app-make-details [makeData]="data" class="make-details-component_details-detail" />
        <app-make-logo class="make-details-component_details-logo" />
    </div>
    <div>
        <app-model-table-component [data]="(modelData$ | async) ?? DEFAULT_DATA" (getModelsEmitter)="getModels($event)" />
    </div>
</div>
